name : Test Workflow
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Get Code
        uses: actions/checkout@v2
      - name: use node
        uses: actions/setup-node@v2
        with :
          node-version: '14'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Tests
        run: npm test
        working-directory: frontend